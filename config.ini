[General]
# Domain for slipstream-client
Domain = example.com
# Congestion control algorithm
CongestionControl = bbr
# Keep-alive interval in milliseconds
KeepAliveInterval = 2000

[Testing]
# Seconds to wait for "Connection ready" from slipstream-client
Timeout = 3
# Number of parallel test workers
Workers = 5
# URL to verify internet connectivity (expects HTTP 204)
ConnectivityUrl = http://connectivitycheck.gstatic.com/generate_204
# Fallback URL if primary is blocked (expects "Microsoft Connect Test" in body)
FallbackUrl = http://www.msftconnecttest.com/connecttest.txt
# Seconds to wait for connectivity check response
ConnectivityTimeout = 5

[Connection]
# Seconds between health checks on active connection
HealthCheckInterval = 30
# Max reconnect attempts before giving up (0 = unlimited, keeps trying forever)
MaxReconnectAttempts = 0

[Advanced]
# Shuffle DNS list so different entries are tested each run
ShuffleDns = false
# Try previously working DNS entries first (from results/working-dns.txt)
PrioritizeKnownGood = true
# Skip DNS entries that failed in previous runs (from results/failed-dns.txt)
SkipPreviouslyFailed = true
